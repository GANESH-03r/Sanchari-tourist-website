<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Packages – Sanchari</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#FAFAFA; --text:#263238; --primary:#546E7A;
      --primary-light:#78909C; --accent:#E17055; --white:#fff;
      --shadow:0 10px 30px rgba(0,0,0,0.10);
      --shadow-hover:0 18px 40px rgba(0,0,0,0.18);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);}
    h1,h2,h3,h4{font-family:'Playfair Display',serif;}
    a{text-decoration:none;color:inherit;}
    ul{list-style:none;}

    header{
      display:flex;justify-content:space-between;align-items:center;
      padding:18px 5%;background:rgba(250,250,250,0.97);
      position:sticky;top:0;z-index:1000;
      box-shadow:0 2px 20px rgba(0,0,0,0.08);
    }
    .logo-text{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;}
    nav ul{display:flex;gap:30px;align-items:center;}
    nav a{font-size:0.95rem;font-weight:600;color:#546E7A;transition:color 0.2s;}
    nav a:hover,nav a.active{color:#263238;border-bottom:2px solid #263238;padding-bottom:2px;}
    .login-btn{
      background:linear-gradient(135deg,#78909C,#546E7A);
      color:white;padding:10px 25px;border-radius:50px;
      font-weight:500;border:none;cursor:pointer;
    }

    .page-hero{
      background:linear-gradient(135deg,#546E7A,#263238);
      color:white;text-align:center;padding:80px 5% 60px;
      position:relative;overflow:hidden;
    }
    .page-hero::before{
      content:'';position:absolute;inset:0;
      background:url('https://images.unsplash.com/photo-1551632811-561732d1e306?w=1400&auto=format&fit=crop') center/cover;
      opacity:0.15;
    }
    .page-hero h1{font-size:3.2rem;margin-bottom:14px;position:relative;}
    .page-hero p{font-size:1.1rem;color:rgba(255,255,255,0.8);position:relative;}

    .filter-bar{
      display:flex;gap:16px;align-items:center;flex-wrap:wrap;
      padding:28px 5%;background:white;
      box-shadow:0 4px 20px rgba(0,0,0,0.06);
    }
    .filter-btn{
      padding:11px 22px;border-radius:50px;border:2px solid #ECEFF1;
      background:white;font-size:0.85rem;font-weight:600;
      color:var(--primary);cursor:pointer;transition:all 0.2s;
      font-family:'Montserrat',sans-serif;
    }
    .filter-btn:hover,.filter-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
    .results-count{margin-left:auto;font-size:0.9rem;color:#78909C;}
    .packages-section{padding:50px 5% 80px;}
    .section-label{font-size:1.6rem;margin-bottom:36px;padding-bottom:12px;border-bottom:2px solid #ECEFF1;}

    .pkg-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:32px;
    }

    .pkg-card{
      background:white;border-radius:20px;overflow:hidden;
      box-shadow:var(--shadow);transition:transform 0.3s,box-shadow 0.3s;
      opacity:0;transform:translateY(24px);
      animation:fadeUp 0.5s ease forwards;
    }
    .pkg-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-hover);}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

    .pkg-img{position:relative;height:220px;overflow:hidden;}
    .pkg-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s;}
    .pkg-card:hover .pkg-img img{transform:scale(1.07);}
    .pkg-badge{
      position:absolute;top:14px;left:14px;
      background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);
      padding:4px 12px;border-radius:50px;
      font-size:0.75rem;font-weight:700;color:var(--primary);
    }
    .pkg-duration{
      position:absolute;bottom:14px;right:14px;
      background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
      padding:4px 10px;border-radius:50px;
      font-size:0.78rem;font-weight:600;color:white;
    }

    .pkg-body{padding:22px;}
    .pkg-body h3{font-size:1.25rem;margin-bottom:8px;}
    .pkg-desc{font-size:0.85rem;color:#78909C;line-height:1.7;margin-bottom:16px;}

    .pkg-highlights{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
    .highlight{
      background:#F0F4F8;color:var(--primary);
      padding:4px 12px;border-radius:50px;font-size:0.78rem;font-weight:600;
    }

    .pkg-footer{
      display:flex;justify-content:space-between;align-items:center;
      padding-top:16px;border-top:1px solid #F0F4F8;
    }
    .pkg-price{font-size:1.1rem;font-weight:700;color:var(--accent);}
    .pkg-price span{font-size:0.75rem;font-weight:400;color:#90A4AE;}
    .book-btn{
      background:linear-gradient(135deg,#78909C,#546E7A);
      color:white;padding:9px 20px;border-radius:50px;
      font-size:0.85rem;font-weight:600;border:none;cursor:pointer;
      font-family:'Montserrat',sans-serif;transition:transform 0.2s,box-shadow 0.2s;
    }
    .book-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(84,110,122,0.35);}

    /* Toast */
    #toast{
      position:fixed;bottom:30px;left:50%;
      transform:translateX(-50%) translateY(20px);
      background:var(--primary);color:white;
      padding:14px 28px;border-radius:50px;
      font-size:0.9rem;font-weight:500;z-index:9999;
      opacity:0;transition:all 0.4s ease;white-space:nowrap;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    footer{background:#607D8B;color:#B0BEC5;text-align:center;padding:24px;font-size:0.85rem;}
    @media(max-width:750px){nav{display:none;}}
  </style>
</head>
<body>

<header>
  <a href="sturcture.html" class="logo-text">Sanchari</a>
  <div id="header"></div>
  <button class="login-btn">Login</button>
</header>

<div class="page-hero">
  <h1>Our Packages</h1>
  <p>Handcrafted travel experiences for every kind of explorer</p>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="Adventure">Adventure</button>
  <button class="filter-btn" data-filter="Family">Family</button>
  <button class="filter-btn" data-filter="Wellness">Wellness</button>
  <button class="filter-btn" data-filter="Romance">Romance</button>
  <button class="filter-btn" data-filter="Cultural">Cultural</button>
  <div class="results-count" id="results-count">0 packages found</div>
</div>

<div class="packages-section">
  <h2 class="section-label">All Packages</h2>

  <div class="pkg-grid" id="pkg-grid"></div>
</div>

<footer id="footer">&copy; 2026 Sanchari. All rights reserved.</footer>
<div id="toast"></div>
<script src="../js/loadcomponent.js"></script>
<script type="module" src="../js/main.js"></script>
<script>
  let PACKAGES = [];

  // async function loadJSONData(url) {
  //   const response = await fetch(url);
  //   if (!response.ok) {
  //     throw new Error(`Unable to load ${url} (status ${response.status})`);
  //   }
  //   return response.json();
  // }

    function initData() {
    init("../data/packages.json");
    console.log("Data initialized");
  }
  initData();
  

  let activeFilter = 'all';

  function renderPackages() {
    const grid = document.getElementById('pkg-grid');
    grid.innerHTML = '';
    const filtered = activeFilter === 'all'
      ? PACKAGES
      : PACKAGES.filter(p => p.category === activeFilter);
    document.querySelector('.section-label').textContent = activeFilter === 'all' ? 'All Packages' : `${activeFilter} Packages`;
    document.getElementById('results-count').textContent = `${filtered.length} package${filtered.length !== 1 ? 's' : ''} found`;
    filtered.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'pkg-card';
      card.style.animationDelay = `${i * 0.08}s`;
      card.innerHTML = `
        <div class="pkg-img">
          <img src="${p.image}" alt="${p.name}" loading="lazy"/>
          <span class="pkg-badge">${p.category}</span>
          <span class="pkg-duration">⏱ ${p.duration}</span>
        </div>
        <div class="pkg-body">
          <h3>${p.name}</h3>
          <p class="pkg-desc">${p.desc}</p>
          <div class="pkg-highlights">
            ${p.highlights.map(h => `<span class="highlight">✓ ${h}</span>`).join('')}
          </div>
          <div class="pkg-footer">
            <div class="pkg-price">${p.price} <span>/ person</span></div>
            <button class="book-btn" onclick="bookPackage('${p.name}','${p.price}')">Book Now</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderPackages();
    });
  });

  function bookPackage(name, price) {
    showToast(`✅ Booking started for ${name} — ${price}`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

</script>
</body>
</html>
