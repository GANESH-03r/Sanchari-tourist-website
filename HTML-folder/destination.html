<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Destinations – Sanchari</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fafafa;
        --text: #263238;
        --primary: #546e7a;
        --primary-light: #78909c;
        --accent: #e17055;
        --white: #fff;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        --shadow-hover: 0 18px 40px rgba(0, 0, 0, 0.18);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Montserrat", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: "Playfair Display", serif;
      }
      a {
        text-decoration: none;
        color: inherit;
      }
      ul {
        list-style: none;
      }

      /* ── HEADER ── */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 5%;
        background: rgba(250, 250, 250, 0.97);
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      }
      .logo-text {
        font-family: "Playfair Display", serif;
        font-size: 2rem;
        font-weight: 700;
        color: var(--text);
      }
      nav ul {
        display: flex;
        gap: 30px;
        align-items: center;
      }
      nav a {
        font-size: 0.95rem;
        font-weight: 600;
        color: #546e7a;
        transition: color 0.2s;
      }
      nav a:hover,
      nav a.active {
        color: #263238;
        border-bottom: 2px solid #263238;
        padding-bottom: 2px;
      }
      .login-btn {
        background: linear-gradient(135deg, #78909c, #546e7a);
        color: white;
        padding: 10px 25px;
        border-radius: 50px;
        font-weight: 500;
        border: none;
        cursor: pointer;
      }

      /* ── PAGE HERO ── */
      .page-hero {
        background: linear-gradient(135deg, #546e7a 0%, #263238 100%);
        color: white;
        text-align: center;
        padding: 80px 5% 60px;
        position: relative;
        overflow: hidden;
      }
      .page-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=1400&auto=format&fit=crop")
          center/cover;
        opacity: 0.15;
      }
      .page-hero h1 {
        font-size: 3.2rem;
        margin-bottom: 14px;
        position: relative;
      }
      .page-hero p {
        font-size: 1.1rem;
        color: rgba(255, 255, 255, 0.8);
        position: relative;
      }

      /* ── SEARCH & FILTER BAR ── */
      .filter-bar {
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
        padding: 30px 5%;
        background: white;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      }
      .search-box {
        flex: 1;
        min-width: 220px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: #f0f4f8;
        border-radius: 50px;
        padding: 12px 20px;
      }
      .search-box input {
        border: none;
        background: transparent;
        outline: none;
        font-size: 0.95rem;
        font-family: "Montserrat", sans-serif;
        width: 100%;
      }
      .filter-btn {
        padding: 11px 22px;
        border-radius: 50px;
        border: 2px solid #eceff1;
        background: white;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--primary);
        cursor: pointer;
        transition: all 0.2s;
        font-family: "Montserrat", sans-serif;
      }
      .filter-btn:hover,
      .filter-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .results-count {
        margin-left: auto;
        font-size: 0.85rem;
        color: var(--primary-light);
        font-weight: 500;
      }

      /* ── DESTINATION GRID ── */
      .destinations-section {
        padding: 50px 5% 80px;
      }
      .section-label {
        font-size: 1.6rem;
        margin-bottom: 36px;
        color: var(--text);
        padding-bottom: 12px;
        border-bottom: 2px solid #eceff1;
      }
      .dest-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 32px;
      }

      /* ── DESTINATION CARD ── */
      .dest-card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: var(--shadow);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        cursor: pointer;
        opacity: 0;
        transform: translateY(24px);
        animation: fadeUp 0.5s ease forwards;
      }
      .dest-card:hover {
        transform: translateY(-8px);
        box-shadow: var(--shadow-hover);
      }

      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .dest-card-img {
        position: relative;
        height: 210px;
        overflow: hidden;
      }
      .dest-card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }
      .dest-card:hover .dest-card-img img {
        transform: scale(1.07);
      }

      .dest-badge {
        position: absolute;
        top: 14px;
        left: 14px;
        background: rgba(255, 255, 255, 0.92); /* backdrop-filter:blur(6px)*/
        padding: 4px 12px;
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--primary);
      }
      .dest-rating {
        position: absolute;
        top: 14px;
        right: 14px;
        background: rgba(0, 0, 0, 0.55); /*backdrop-filter:blur(6px)*/
        padding: 4px 10px;
        border-radius: 50px;
        font-size: 0.78rem;
        font-weight: 600;
        color: white;
      }

      .dest-card-body {
        padding: 20px;
      }
      .dest-card-body h3 {
        font-size: 1.25rem;
        margin-bottom: 6px;
      }
      .dest-location {
        font-size: 0.82rem;
        color: var(--primary-light);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .dest-desc {
        font-size: 0.85rem;
        color: #78909c;
        line-height: 1.7;
        margin-bottom: 16px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .dest-card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 14px;
        border-top: 1px solid #f0f4f8;
      }
      .dest-price {
        font-size: 1rem;
        font-weight: 700;
        color: var(--accent);
      }
      .dest-price span {
        font-size: 0.75rem;
        font-weight: 400;
        color: #90a4ae;
      }
      .view-btn {
        background: linear-gradient(135deg, #78909c, #546e7a);
        color: white;
        padding: 8px 18px;
        border-radius: 50px;
        font-size: 0.82rem;
        font-weight: 600;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .view-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(84, 110, 122, 0.35);
      }

      /* no results */
      .no-results {
        text-align: center;
        padding: 60px 20px;
        display: none;
        grid-column: 1/-1;
      }
      .no-results p {
        color: var(--primary-light);
        font-size: 1rem;
      }

      /* state active banner */
      .state-banner {
        display: none;
        align-items: center;
        gap: 12px;
        background: #e8f0f3;
        padding: 14px 5%;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--primary);
      }
      .state-banner.show {
        display: flex;
      }
      .clear-state {
        margin-left: auto;
        background: var(--primary);
        color: white;
        border: none;
        padding: 7px 18px;
        border-radius: 50px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Montserrat", sans-serif;
      }
      .clear-state:hover {
        background: #37474f;
      }

      /* ── FOOTER ── */
      footer {
        background: #607d8b;
        color: white;
        text-align: center;
        padding: 24px;
        font-size: 0.85rem;
        color: #b0bec5;
      }

      @media (max-width: 750px) {
        nav {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">
        <a href="sturcture.html" class="logo-text">Sanchari</a>
      </div>
      <div id="header"></div>
      <button class="login-btn">Login</button>
    </header>

    <!-- PAGE HERO -->
    <div class="page-hero">
      <h1>Explore Destinations</h1>
      <p>Discover the most beautiful places across India</p>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <div class="search-box">
        <span>🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder="Search destinations..."
        />
      </div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Heritage">Heritage</button>
      <button class="filter-btn" data-filter="Nature">Nature</button>
      <button class="filter-btn" data-filter="Spiritual">Spiritual</button>
      <button class="filter-btn" data-filter="Adventure">Adventure</button>
      <span class="results-count" id="results-count">8 destinations</span>
    </div>

    <!-- STATE BANNER -->
    <div class="state-banner" id="state-banner">
      <span>🗺️</span>
      <span id="state-banner-text">Showing places in Kerala</span>
      <button class="clear-state" onclick="clearStateFilter()">
        ✕ Show All States
      </button>
    </div>

    <!-- DESTINATIONS GRID -->
    <div class="destinations-section">
      <h2 class="section-label">All Destinations</h2>
      <div class="dest-grid" id="dest-grid">
        <!-- Cards injected by JS -->
        <div class="no-results" id="no-results">
          <p>😕 No destinations found. Try a different search.</p>
        </div>
      </div>
    </div>

    <footer>&copy; 2026 Sanchari. All rights reserved.</footer>

    <script src="../JS folder/loadcomponent.js"></script>
    <script>
      
      let DESTINATIONS = [];
      async function fetchDestinations() {
        
        const response = await fetch("../data/destinations.json");
        const data = await response.json();
        return data;
        console.log("Fetched Destinations:", data); // Debug log
      }
      async function initDestination(){
      DESTINATIONS = await fetchDestinations();
      console.log("Initialized Destinations:", DESTINATIONS); // Debug log
      
      }
      initDestination();

    
    </script>
  </body>
</html>
